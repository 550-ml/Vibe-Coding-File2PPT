name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Build EXE
        run: pyinstaller --noconfirm --clean --onefile --windowed build\File2PPT.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: File2PPT-windows-exe
          path: dist/File2PPT.exe
